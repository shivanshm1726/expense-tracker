version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: expense-tracker-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-expense_tracker_db}
      POSTGRES_USER: ${DB_USER:-expense_user}
      POSTGRES_PASSWORD: ${DB_PASS:-expense_pass}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-expense_user} -d ${DB_NAME:-expense_tracker_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: expense-tracker-backend:local
    container_name: expense-tracker-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-expense_tracker_db}
      DATABASE_USERNAME: ${DB_USER:-expense_user}
      DATABASE_PASSWORD: ${DB_PASS:-expense_pass}
      HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      PORT: 8080
    ports:
      - "8080:8080"
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api}
    image: expense-tracker-frontend:local
    container_name: expense-tracker-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    restart: on-failure

volumes:
  postgres-data:
