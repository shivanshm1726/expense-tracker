# ========================
# SERVER CONFIG
# ========================
server.port=${PORT:8080}

# ========================
# DATABASE CONFIG
# ========================
# For LOCAL development (PostgreSQL via Homebrew):
#   Leave DATABASE_URL unset — it defaults to local PostgreSQL
# For PRODUCTION (Supabase PostgreSQL):
#   Set DATABASE_URL=jdbc:postgresql://db.xxx.supabase.co:5432/postgres?sslmode=require
#   Set DATABASE_USERNAME=postgres
#   Set DATABASE_PASSWORD=your_supabase_password
# ========================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/expense_tracker_db}
spring.datasource.username=${DATABASE_USERNAME:shivanshmishra}
spring.datasource.password=${DATABASE_PASSWORD:}

# Connection pool settings
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.initialization-fail-timeout=-1

# ========================
# JPA / HIBERNATE CONFIG
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
